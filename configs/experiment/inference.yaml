# @package _global_

defaults:
  - override /model: smart

model:
  model_config:
    validation_rollout_sampling:
      criterium: topk_prob
      num_k: 48 # for k most likely
      temp: 1.0
    result_save_dir: None
    token_processor:
      agent_token_file: "trajtok_vocab.pkl" 
    val_open_loop: false
    val_closed_loop: true
    calculate_wosac_metrics: true
    wosac_metrics_version: "2025"

ckpt_path:  #YOUR_CHECKPOINT_PATH

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  check_val_every_n_epoch: 1

data:
  train_batch_size: 16
  val_batch_size: 16
  test_batch_size: 16
  num_workers: 8


action: validate
